<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <header>
        <h1>Add Course</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="My Courses.html">My Courses</a>
        <a href="Add_Course.html">Add Course</a>
        <a href="Contact.html">Contact us</a>
    </nav>

    <main>
    <section class="course-box">

        <form>
            <h2>Add Course</h2>

            <input type="text" placeholder="Course Name" required>
            <input type="text" placeholder="Course Code" required>
            <input type="number" placeholder="Credit Hours" required>
            <textarea placeholder="Course Description"></textarea>

            <button type="submit">Add Course</button>
        </form>

        <div class="course-image">
            <img src="photos/add course.jfif" alt="Course Image" width="250px">
        </div>

    </section>
</main>
    <footer>
        <p>© 2026</p>
    </footer>

</body>

</html>
